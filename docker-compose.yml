version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "3001:10000"
    environment:
      - NODE_ENV=production
      - PORT=10000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./packages/client/dist:/usr/share/nginx/html:ro
    depends_on:
      - server
    restart: unless-stopped
