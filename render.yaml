services:
  # Single service: Backend + Frontend
  - type: web
    name: push-io
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter shared build && pnpm --filter client build && pnpm --filter server build
    startCommand: node packages/server/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /health
    autoDeploy: true

